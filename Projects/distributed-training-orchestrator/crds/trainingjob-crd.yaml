apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: trainingjobs.ml.sonal.dev
spec:
  group: ml.sonal.dev
  scope: Namespaced
  names:
    plural: trainingjobs
    singular: trainingjob
    kind: TrainingJob
    shortNames: ["tj"]
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Epoch
          type: integer
          jsonPath: .status.currentEpoch
        - name: Workers
          type: integer
          jsonPath: .spec.workerCount
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["image", "workerCount", "epochs"]
              properties:
                image:
                  type: string
                  description: Container image with the TorchSharp worker binary.
                workerCount:
                  type: integer
                  minimum: 1
                  description: Number of data-parallel worker ranks.
                epochs:
                  type: integer
                  minimum: 1
                checkpointInterval:
                  type: integer
                  minimum: 1
                  default: 1
                  description: Save a checkpoint every N epochs.
                datasetPvcName:
                  type: string
                  description: PVC containing the training dataset.
                checkpointPvcName:
                  type: string
                  description: PVC used for checkpoint storage, shared across ranks.
                resources:
                  type: object
                  properties:
                    cpu:
                      type: string
                      default: "1"
                    memory:
                      type: string
                      default: "2Gi"
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: ["Pending", "Running", "Resuming", "Succeeded", "Failed"]
                currentEpoch:
                  type: integer
                workerStatuses:
                  type: array
                  items:
                    type: object
                    properties:
                      rank:
                        type: integer
                      podName:
                        type: string
                      phase:
                        type: string
                      lastCheckpointEpoch:
                        type: integer
                      restartCount:
                        type: integer
                lastUpdated:
                  type: string
                  format: date-time
