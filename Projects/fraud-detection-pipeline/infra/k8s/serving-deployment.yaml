# Deploys the ASP.NET Core model-serving container built from Serving/Dockerfile.
# Build & push first, e.g.:
#   docker build -t <your-acr>.azurecr.io/fraud-serving:latest -f Serving/Dockerfile .
#   docker push <your-acr>.azurecr.io/fraud-serving:latest
# Then update the image reference below and apply:
#   kubectl apply -f serving-deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-serving
  labels:
    app: fraud-serving
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fraud-serving
  template:
    metadata:
      labels:
        app: fraud-serving
    spec:
      containers:
        - name: fraud-serving
          image: <your-acr>.azurecr.io/fraud-serving:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-serving
spec:
  selector:
    app: fraud-serving
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fraud-serving-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fraud-serving
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
